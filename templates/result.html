<!doctype html>
<html>
  <head>
    <title>Prediction Result</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5;
        padding-top: 40px;
      }

      .container {
        background: white;
        width: 700px;
        margin: auto;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }

      img {
        width: 400px;
        margin-top: 20px;
        border-radius: 10px;
      }

      h1 {
        color: #333;
      }

      .prediction {
        margin-top: 20px;
        font-size: 24px;
        color: #007bff;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Prediction Result</h1>

      <img src="{{ image_path }}" alt="Uploaded Image" />

      <div class="prediction">
        <p><strong>Predicted Defect:</strong> {{ prediction }}</p>

        <p><strong>Confidence:</strong> {{ confidence }}%</p>
      </div>

      <br />

      <a href="/">Try Another Image</a>
    </div>
  </body>
</html>
